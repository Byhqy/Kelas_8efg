<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InformaQuiz – Informatika Kelas 8</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(56,189,248,0.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(129,140,248,0.07) 0%, transparent 60%);
  }

  /* ─── SCREENS ─── */
  .screen { display:none; }
  .screen.active { display:block; animation: fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  /* ─── LOGIN ─── */
  #loginScreen {
    min-height:100vh;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:24px;
  }
  #loginScreen.active { display:flex; }
  .logo-wrap { text-align:center; margin-bottom:36px; }
  .logo-icon {
    width:72px; height:72px; border-radius:20px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    display:inline-flex; align-items:center; justify-content:center;
    font-size:36px; margin-bottom:14px;
    box-shadow: 0 0 40px rgba(56,189,248,0.3);
  }
  .logo-title { font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; letter-spacing:-1px; }
  .logo-title span { color:var(--accent); }
  .logo-sub { color:var(--muted); font-size:.9rem; margin-top:4px; }

  .login-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:32px;
    width:100%; max-width:420px;
    box-shadow:0 24px 64px rgba(0,0,0,.5);
  }
  .login-card h2 { font-size:1.2rem; margin-bottom:24px; color:var(--accent); }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:7px; letter-spacing:.05em; text-transform:uppercase; }
  .form-group input, .form-group select {
    width:100%; padding:12px 16px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:inherit; font-size:.95rem;
    outline:none; transition:.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(56,189,248,.15); }
  .form-group select option { background:var(--surface); }
  .btn-start {
    width:100%; padding:14px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; border-radius:10px; color:#fff;
    font-family:'Syne',sans-serif; font-size:1rem; font-weight:700;
    cursor:pointer; transition:.2s; letter-spacing:.04em;
    margin-top:6px;
  }
  .btn-start:hover { opacity:.88; transform:translateY(-1px); box-shadow:0 8px 24px rgba(56,189,248,.3); }
  .info-badge {
    display:flex; align-items:center; gap:10px;
    background:rgba(56,189,248,.08); border:1px solid rgba(56,189,248,.2);
    border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:.85rem; color:var(--muted);
  }

  /* ─── QUIZ ─── */
  #quizScreen { min-height:100vh; display:none; flex-direction:column; }
  #quizScreen.active { display:flex; }

  .quiz-header {
    position:sticky; top:0; z-index:10;
    background:rgba(10,14,26,.9); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:14px 24px; display:flex; align-items:center; gap:16px;
  }
  .quiz-header .q-info { flex:1; }
  .q-counter { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
  .q-counter span { color:var(--accent); }
  .progress-bar { height:6px; background:var(--surface); border-radius:3px; margin-top:6px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:.4s; }
  .timer-badge {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:6px 14px; font-family:'Syne',sans-serif;
    font-size:1rem; font-weight:700; min-width:68px; text-align:center;
  }
  .timer-badge.warn { border-color:var(--yellow); color:var(--yellow); }
  .timer-badge.danger { border-color:var(--red); color:var(--red); animation:pulse .6s infinite alternate; }
  @keyframes pulse { from{opacity:1} to{opacity:.5} }

  .quiz-body { flex:1; padding:24px; max-width:740px; margin:0 auto; width:100%; }

  .question-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:28px; margin-bottom:20px;
  }
  .q-topic { font-size:.78rem; color:var(--accent2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
  .q-text { font-size:1.05rem; line-height:1.65; }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; padding:14px 18px;
    color:var(--text); font-family:inherit; font-size:.95rem;
    cursor:pointer; text-align:left; display:flex; align-items:center; gap:14px;
    transition:.18s;
  }
  .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(56,189,248,.06); }
  .option-btn .opt-key {
    width:28px; height:28px; border-radius:7px; border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:.8rem; flex-shrink:0; transition:.18s;
  }
  .option-btn.selected { border-color:var(--accent); background:rgba(56,189,248,.1); }
  .option-btn.selected .opt-key { background:var(--accent); border-color:var(--accent); color:#fff; }
  .option-btn.correct { border-color:var(--green); background:rgba(52,211,153,.1); }
  .option-btn.correct .opt-key { background:var(--green); border-color:var(--green); color:#fff; }
  .option-btn.wrong { border-color:var(--red); background:rgba(248,113,113,.1); }
  .option-btn.wrong .opt-key { background:var(--red); border-color:var(--red); color:#fff; }
  .option-btn:disabled { cursor:not-allowed; }

  .quiz-nav { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:20px; }
  .btn-nav {
    padding:11px 24px; border-radius:10px; border:1.5px solid var(--border);
    background:transparent; color:var(--text); font-family:inherit; font-size:.92rem;
    cursor:pointer; transition:.18s; display:flex; align-items:center; gap:7px;
  }
  .btn-nav:hover { border-color:var(--accent); color:var(--accent); }
  .btn-nav.primary {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-color:transparent; color:#fff; font-weight:600;
  }
  .btn-nav.primary:hover { opacity:.87; transform:translateY(-1px); }
  .btn-nav:disabled { opacity:.3; cursor:not-allowed; transform:none !important; }

  .feedback-toast {
    display:none; margin-top:14px;
    padding:12px 16px; border-radius:10px;
    font-size:.88rem; animation:fadeIn .2s;
  }
  .feedback-toast.correct { background:rgba(52,211,153,.1); border:1px solid var(--green); color:var(--green); display:block; }
  .feedback-toast.wrong { background:rgba(248,113,113,.1); border:1px solid var(--red); color:var(--red); display:block; }

  /* ─── RESULT ─── */
  #resultScreen { min-height:100vh; display:none; align-items:center; justify-content:center; flex-direction:column; padding:24px; }
  #resultScreen.active { display:flex; }

  .result-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:36px; width:100%; max-width:500px;
    text-align:center; box-shadow:0 24px 64px rgba(0,0,0,.5);
  }
  .result-emoji { font-size:3.5rem; margin-bottom:10px; }
  .result-name { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:4px; }
  .result-class { color:var(--muted); font-size:.9rem; margin-bottom:28px; }

  .score-ring {
    width:140px; height:140px; border-radius:50%;
    border:8px solid var(--border); margin:0 auto 24px;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; position:relative;
    background: conic-gradient(var(--accent) var(--pct,0%), var(--surface) 0%);
    box-shadow:0 0 40px rgba(56,189,248,.2);
  }
  .score-ring::before {
    content:''; position:absolute; inset:10px;
    border-radius:50%; background:var(--card);
  }
  .score-ring .score-val { position:relative; z-index:1; font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; }
  .score-ring .score-lbl { position:relative; z-index:1; font-size:.7rem; color:var(--muted); }

  .grade-badge {
    display:inline-block; padding:6px 22px;
    border-radius:999px; font-family:'Syne',sans-serif;
    font-size:1.1rem; font-weight:700; margin-bottom:24px;
  }
  .grade-A { background:rgba(52,211,153,.15); color:var(--green); border:1px solid var(--green); }
  .grade-B { background:rgba(56,189,248,.15); color:var(--accent); border:1px solid var(--accent); }
  .grade-C { background:rgba(251,191,36,.15); color:var(--yellow); border:1px solid var(--yellow); }
  .grade-D { background:rgba(248,113,113,.15); color:var(--red); border:1px solid var(--red); }

  .stat-row { display:flex; gap:12px; margin-bottom:24px; }
  .stat-box {
    flex:1; background:var(--surface); border-radius:10px;
    padding:14px; border:1px solid var(--border);
  }
  .stat-box .s-val { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; }
  .stat-box .s-lbl { font-size:.75rem; color:var(--muted); margin-top:2px; }
  .stat-box.green .s-val { color:var(--green); }
  .stat-box.red .s-val { color:var(--red); }
  .stat-box.blue .s-val { color:var(--accent); }

  .btn-result {
    width:100%; padding:13px; border-radius:10px; border:none;
    font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700;
    cursor:pointer; transition:.2s; margin-top:10px;
  }
  .btn-result.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-result.primary:hover { opacity:.87; }
  .btn-result.secondary { background:var(--surface); border:1.5px solid var(--border); color:var(--text); }
  .btn-result.secondary:hover { border-color:var(--accent); color:var(--accent); }

  .submit-status {
    margin-top:14px; padding:10px 16px; border-radius:8px;
    font-size:.82rem; text-align:center;
  }
  .submit-status.loading { background:rgba(56,189,248,.08); color:var(--muted); }
  .submit-status.ok { background:rgba(52,211,153,.1); color:var(--green); }
  .submit-status.err { background:rgba(248,113,113,.1); color:var(--red); }
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen" class="screen active">
  <div class="logo-wrap">
    <div class="logo-icon">💡</div>
    <div class="logo-title">Informa<span></span></div>
    <div class="logo-sub">Kuis Informatika · Kelas 8 EFG</div>
  </div>
  <div class="login-card">
    <h2>⚡ Masuk & Mulai Kuis</h2>
    <div class="info-badge">
      📋 50 soal · 60 menit · Kelas 8E / 8F / 8G
    </div>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="inputName" placeholder="Tulis nama lengkap kamu..." autocomplete="off">
    </div>
    <div class="form-group">
      <label>Kelas</label>
      <select id="inputClass">
        <option value="">— Pilih Kelas —</option>
        <option value="8E">8E</option>
        <option value="8F">8F</option>
        <option value="8G">8G</option>
      </select>
    </div>
    <button class="btn-start" onclick="startQuiz()">Mulai Kuis →</button>
  </div>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div id="quizScreen" class="screen">
  <div class="quiz-header">
    <div class="q-info">
      <div class="q-counter">Soal <span id="qNum">1</span> dari <span id="qTotal">50</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="timer-badge" id="timerBadge">60:00</div>
  </div>
  <div class="quiz-body">
    <div class="question-card">
      <div class="q-topic" id="qTopic"></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="optionsWrap"></div>
    <div class="feedback-toast" id="feedbackToast"></div>
    <div class="quiz-nav">
      <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">← Sebelumnya</button>
      <button class="btn-nav primary" id="btnNext" onclick="navigate(1)">Selanjutnya →</button>
    </div>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-name" id="resultName"></div>
    <div class="result-class" id="resultClass"></div>
    <div class="score-ring" id="scoreRing">
      <div class="score-val" id="scoreVal"></div>
      <div class="score-lbl">NILAI</div>
    </div>
    <div class="grade-badge" id="gradeBadge"></div>
    <div class="stat-row">
      <div class="stat-box green"><div class="s-val" id="sCorrect"></div><div class="s-lbl">✅ Benar</div></div>
      <div class="stat-box red"><div class="s-val" id="sWrong"></div><div class="s-lbl">❌ Salah</div></div>
      <div class="stat-box blue"><div class="s-val" id="sTime"></div><div class="s-lbl">⏱ Waktu</div></div>
    </div>
    <div class="submit-status" id="submitStatus" style="display:none"></div>
    <button class="btn-result secondary" style="margin-top:12px" onclick="resetQuiz()">🔄 Ulangi Kuis</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIGURATION — ganti URL Google Apps Script di bawah
// ══════════════════════════════════════════════════════
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyEbT59cFS6jp9Qp9w0hJ0sxk95x1Pqb7rm523al2Fc-zBG6IIa4Wf9lbWVxr-MOhjYqQ/exec";
// Petunjuk: Deploy Google Apps Script sebagai Web App,
// lalu ganti URL di atas dengan URL deployment-nya.

// ══════════════════════════════════════════════════════
//  50 SOAL INFORMATIKA KELAS 8
// ══════════════════════════════════════════════════════
const questions = [
  // ── SISTEM KOMPUTER (10 soal) ──
  { topic:"Sistem Komputer", text:"Komponen utama yang berfungsi sebagai 'otak' komputer adalah…", options:["RAM","CPU","GPU","SSD"], answer:1 },
  { topic:"Sistem Komputer", text:"Singkatan ROM adalah…", options:["Random Only Memory","Read Only Memory","Run Output Memory","Read Output Mode"], answer:1 },
  { topic:"Sistem Komputer", text:"Perangkat berikut yang termasuk output device adalah…", options:["Keyboard","Mouse","Monitor","Webcam"], answer:2 },
  { topic:"Sistem Komputer", text:"Satuan terkecil dalam penyimpanan data komputer disebut…", options:["Byte","Bit","Kilobyte","Nibble"], answer:1 },
  { topic:"Sistem Komputer", text:"Sistem operasi yang bersifat open-source adalah…", options:["Windows 11","macOS","Linux","MS-DOS"], answer:2 },
  { topic:"Sistem Komputer", text:"Fungsi RAM dalam komputer adalah…", options:["Menyimpan data secara permanen","Memproses instruksi aritmatika","Menyimpan data sementara saat komputer menyala","Menghubungkan komputer ke internet"], answer:2 },
  { topic:"Sistem Komputer", text:"Perangkat yang mengubah sinyal digital menjadi sinyal analog disebut…", options:["Router","Switch","Modem","Hub"], answer:2 },
  { topic:"Sistem Komputer", text:"Satuan kecepatan prosesor diukur dalam…", options:["GB","MHz / GHz","MB/s","DPI"], answer:1 },
  { topic:"Sistem Komputer", text:"Perangkat input yang digunakan untuk memasukkan teks adalah…", options:["Printer","Scanner","Keyboard","Speaker"], answer:2 },
  { topic:"Sistem Komputer", text:"BIOS merupakan singkatan dari…", options:["Basic Input Output System","Binary Input Output Software","Basic Internal Operating System","Binary Integrated Output System"], answer:0 },

  // ── JARINGAN KOMPUTER (10 soal) ──
  { topic:"Jaringan Komputer", text:"Jaringan komputer yang mencakup area dalam satu gedung disebut…", options:["WAN","MAN","LAN","PAN"], answer:2 },
  { topic:"Jaringan Komputer", text:"Alamat unik setiap perangkat dalam jaringan disebut…", options:["MAC Address","IP Address","URL","DNS"], answer:1 },
  { topic:"Jaringan Komputer", text:"Topologi jaringan di mana semua perangkat terhubung ke satu kabel utama disebut…", options:["Star","Ring","Bus","Mesh"], answer:2 },
  { topic:"Jaringan Komputer", text:"Protokol yang digunakan untuk mengakses halaman web adalah…", options:["FTP","SMTP","HTTP/HTTPS","POP3"], answer:2 },
  { topic:"Jaringan Komputer", text:"Alat yang membagi jaringan dan meneruskan data berdasarkan IP address adalah…", options:["Hub","Switch","Router","Repeater"], answer:2 },
  { topic:"Jaringan Komputer", text:"DNS berfungsi untuk…", options:["Mengamankan koneksi internet","Menerjemahkan nama domain ke IP address","Membagi bandwidth jaringan","Menyimpan halaman web"], answer:1 },
  { topic:"Jaringan Komputer", text:"Jaringan yang mencakup seluruh dunia adalah…", options:["LAN","MAN","WAN","CAN"], answer:2 },
  { topic:"Jaringan Komputer", text:"Wi-Fi menggunakan gelombang…", options:["Inframerah","Radio","Ultraviolet","Suara"], answer:1 },
  { topic:"Jaringan Komputer", text:"Kabel yang paling umum digunakan untuk LAN adalah…", options:["Coaxial","Fiber Optic","UTP (Twisted Pair)","HDMI"], answer:2 },
  { topic:"Jaringan Komputer", text:"Topologi jaringan di mana setiap komputer terhubung ke satu titik pusat (switch/hub) disebut…", options:["Bus","Ring","Mesh","Star"], answer:3 },

  // ── ANALISIS DATA (10 soal) ──
  { topic:"Analisis Data", text:"Kumpulan data yang terorganisir dalam baris dan kolom disebut…", options:["Grafik","Tabel","Diagram","Flowchart"], answer:1 },
  { topic:"Analisis Data", text:"Grafik yang cocok untuk menampilkan perbandingan beberapa kategori adalah…", options:["Diagram Lingkaran","Grafik Garis","Grafik Batang","Scatter Plot"], answer:2 },
  { topic:"Analisis Data", text:"Nilai tengah dari sekumpulan data yang telah diurutkan disebut…", options:["Mean","Modus","Median","Range"], answer:2 },
  { topic:"Analisis Data", text:"Nilai yang paling sering muncul dalam sekumpulan data disebut…", options:["Mean","Modus","Median","Varians"], answer:1 },
  { topic:"Analisis Data", text:"Rata-rata dari data: 4, 6, 8, 10, 12 adalah…", options:["7","8","9","10"], answer:1 },
  { topic:"Analisis Data", text:"Aplikasi spreadsheet yang sering digunakan untuk analisis data adalah…", options:["Microsoft Word","Google Docs","Microsoft Excel / Google Sheets","Adobe Photoshop"], answer:2 },
  { topic:"Analisis Data", text:"Diagram lingkaran (pie chart) paling tepat digunakan untuk…", options:["Menampilkan tren data seiring waktu","Menampilkan proporsi/persentase keseluruhan","Membandingkan dua variabel","Menampilkan distribusi frekuensi"], answer:1 },
  { topic:"Analisis Data", text:"Data yang berupa angka/bilangan disebut data…", options:["Kualitatif","Nominal","Kuantitatif","Ordinal"], answer:2 },
  { topic:"Analisis Data", text:"Langkah pertama dalam proses analisis data adalah…", options:["Visualisasi data","Pengumpulan data","Membuat kesimpulan","Mengolah data"], answer:1 },
  { topic:"Analisis Data", text:"Grafik garis paling tepat digunakan untuk…", options:["Perbandingan kategori","Menampilkan tren dari waktu ke waktu","Proporsi data","Korelasi dua variabel"], answer:1 },

  // ── ALGORITMA & PEMROGRAMAN (15 soal) ──
  { topic:"Algoritma & Pemrograman", text:"Algoritma adalah…", options:["Bahasa pemrograman komputer","Urutan langkah-langkah logis untuk menyelesaikan masalah","Program yang sudah jadi","Komponen dalam CPU"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Simbol belah ketupat dalam flowchart mewakili…", options:["Proses","Input/Output","Keputusan (percabangan)","Terminal"], answer:2 },
  { topic:"Algoritma & Pemrograman", text:"Struktur kendali yang mengulang perintah selama kondisi terpenuhi adalah…", options:["Sequence","Selection","Repetition/Looping","Function"], answer:2 },
  { topic:"Algoritma & Pemrograman", text:"Dalam bahasa Scratch, blok yang digunakan untuk mengulang adalah…", options:["If-Then","Repeat/Forever","Say","Move"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Variabel dalam pemrograman berfungsi untuk…", options:["Menjalankan program","Menyimpan data sementara","Membuat antarmuka","Mengatur kecepatan program"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Pseudocode digunakan untuk…", options:["Menulis kode yang langsung bisa dijalankan","Menggambarkan algoritma dengan bahasa yang mudah dipahami","Mengkompilasi program","Menguji program"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Output dari kode berikut: x = 5; if x > 3 then print('Besar') else print('Kecil') adalah…", options:["Kecil","Besar","Error","Tidak ada output"], answer:1 },

  { topic:"Algoritma & Pemrograman", text:"Pernyataan yang benar tentang debugging adalah…", options:["Proses menulis kode baru","Proses mencari dan memperbaiki kesalahan dalam program","Proses mengompilasi program","Proses mendistribusikan program"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Dalam pemrograman, tipe data untuk menyimpan teks disebut…", options:["Integer","Boolean","Float","String"], answer:3 },
  { topic:"Algoritma & Pemrograman", text:"Loop FOR biasanya digunakan ketika…", options:["Jumlah pengulangan tidak diketahui","Jumlah pengulangan sudah diketahui","Kondisi selalu benar","Program harus berhenti"], answer:1 },
  { topic:"Algoritma & Pemrograman", text:"Nilai Boolean hanya memiliki dua kemungkinan, yaitu…", options:["0 dan 1","Ya dan Tidak","True dan False","On dan Off"], answer:2 },
  { topic:"Algoritma & Pemrograman", text:"Operator logika AND menghasilkan True jika…", options:["Salah satu kondisi benar","Kedua kondisi benar","Kedua kondisi salah","Hanya kondisi pertama benar"], answer:1 },

  // ── KEAMANAN & LITERASI DIGITAL (5 soal) ──
  { topic:"Literasi Digital", text:"Tindakan mencuri informasi pribadi dengan cara menyamar sebagai pihak terpercaya disebut…", options:["Hacking","Phishing","Spamming","Malware"], answer:1 },
  { topic:"Literasi Digital", text:"Kata sandi yang paling aman adalah…", options:["nama123","tanggal_lahir","kombinasi huruf besar-kecil, angka, dan simbol","nama_sekolah"], answer:2 },
  { topic:"Literasi Digital", text:"Etika dalam penggunaan internet (netiquette) meliputi…", options:["Menyebarkan hoaks","Berkomunikasi sopan dan menghormati orang lain","Mengunduh software ilegal","Mengakses data orang lain tanpa izin"], answer:1 },
  { topic:"Literasi Digital", text:"Hak Kekayaan Intelektual (HKI) dalam bidang perangkat lunak disebut…", options:["Paten","Hak Cipta (Copyright)","Merek Dagang","Lisensi Gratis"], answer:1 },

// ════════════════════
//  STATE
// ════════════════════
let state = {
  name:"", kelas:"",
  current:0, answers:[],
  startTime:null, timerInterval:null, timeLeft:3600 // 60 menit
};

// ════════════════════
//  START
// ════════════════════
function startQuiz(){
  const name  = document.getElementById('inputName').value.trim();
  const kelas = document.getElementById('inputClass').value;
  if(!name){ alert('Masukkan nama lengkap kamu!'); return; }
  if(!kelas){ alert('Pilih kelas terlebih dahulu!'); return; }
  state.name  = name;
  state.kelas = kelas;
  state.current = 0;
  state.answers = new Array(questions.length).fill(null);
  state.startTime = Date.now();
  state.timeLeft = 3600;
  showScreen('quizScreen');
  renderQuestion();
  startTimer();
}

// ════════════════════
//  TIMER
// ════════════════════
function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(()=>{
    state.timeLeft--;
    updateTimerUI();
    if(state.timeLeft <= 0){ clearInterval(state.timerInterval); finishQuiz(); }
  }, 1000);
}

function updateTimerUI(){
  const m = Math.floor(state.timeLeft/60).toString().padStart(2,'0');
  const s = (state.timeLeft%60).toString().padStart(2,'0');
  const el = document.getElementById('timerBadge');
  el.textContent = `${m}:${s}`;
  el.className = 'timer-badge' + (state.timeLeft<60?' danger':state.timeLeft<300?' warn':'');
}

// ════════════════════
//  RENDER QUESTION
// ════════════════════
function renderQuestion(){
  const q   = questions[state.current];
  const idx = state.current;
  document.getElementById('qNum').textContent   = idx+1;
  document.getElementById('qTotal').textContent = questions.length;
  document.getElementById('qTopic').textContent = q.topic;
  document.getElementById('qText').textContent  = q.text;
  document.getElementById('progressFill').style.width = ((idx+1)/questions.length*100)+'%';

  const keys = ['A','B','C','D'];
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if(state.answers[idx] !== null){
      if(i === q.answer) btn.className += ' correct';
      else if(i === state.answers[idx]) btn.className += ' wrong';
      btn.disabled = true;
    } else if(state.answers[idx] === i){
      btn.className += ' selected';
    }
    btn.innerHTML = `<span class="opt-key">${keys[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedbackToast');
  fb.className = 'feedback-toast';
  if(state.answers[idx] !== null){
    if(state.answers[idx] === q.answer){
      fb.className += ' correct'; fb.textContent = '✅ Jawaban benar!';
    } else {
      fb.className += ' wrong';
      fb.textContent = `❌ Salah. Jawaban yang benar: ${keys[q.answer]}. ${q.options[q.answer]}`;
    }
  }

  // nav buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  const isLast = idx === questions.length-1;
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = isLast ? '🏁 Selesai' : 'Selanjutnya →';
  if(isLast){
    btnNext.onclick = ()=>{ if(confirmFinish()) finishQuiz(); };
  } else {
    btnNext.onclick = ()=>navigate(1);
  }
}

function selectAnswer(i){
  if(state.answers[state.current] !== null) return;
  state.answers[state.current] = i;
  renderQuestion();
}

function navigate(dir){
  state.current = Math.max(0, Math.min(questions.length-1, state.current+dir));
  renderQuestion();
}

function confirmFinish(){
  const unanswered = state.answers.filter(a=>a===null).length;
  if(unanswered > 0){
    return confirm(`Masih ada ${unanswered} soal belum dijawab. Yakin ingin menyelesaikan kuis?`);
  }
  return true;
}

// ════════════════════
//  FINISH
// ════════════════════
function finishQuiz(){
  clearInterval(state.timerInterval);
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const correct = state.answers.reduce((sum,a,i)=>sum+(a===questions[i].answer?1:0),0);
  const wrong   = state.answers.reduce((sum,a,i)=>sum+(a!==null&&a!==questions[i].answer?1:0),0);
  const score   = Math.round(correct/questions.length*100);

  // grade
  let grade='D', gradeClass='grade-D', emoji='😓';
  if(score>=90){grade='A';gradeClass='grade-A';emoji='🏆';}
  else if(score>=75){grade='B';gradeClass='grade-B';emoji='🎉';}
  else if(score>=60){grade='C';gradeClass='grade-C';emoji='👍';}

  // ring
  const ring = document.getElementById('scoreRing');
  ring.style.setProperty('--pct', score*3.6+'deg');

  document.getElementById('resultEmoji').textContent     = emoji;
  document.getElementById('resultName').textContent      = state.name;
  document.getElementById('resultClass').textContent     = `Kelas ${state.kelas} · ${questions.length} Soal`;
  document.getElementById('scoreVal').textContent        = score;
  document.getElementById('gradeBadge').textContent      = `Predikat ${grade}`;
  document.getElementById('gradeBadge').className        = `grade-badge ${gradeClass}`;
  document.getElementById('sCorrect').textContent        = correct;
  document.getElementById('sWrong').textContent          = wrong;

  const mm = Math.floor(elapsed/60).toString().padStart(2,'0');
  const ss = (elapsed%60).toString().padStart(2,'0');
  document.getElementById('sTime').textContent = `${mm}:${ss}`;

  // store for sheets
  state._result = { name:state.name, kelas:state.kelas, score, correct, wrong, grade,
                    time:`${mm}:${ss}`, date:new Date().toLocaleString('id-ID') };
  showScreen('resultScreen');
  // Kirim otomatis ke Google Sheets segera setelah hasil tampil
  submitToSheets();
}

// ════════════════════
//  GOOGLE SHEETS
// ════════════════════
async function submitToSheets(){
  const s = document.getElementById('submitStatus');
  s.style.display='block'; s.className='submit-status loading'; s.textContent='⏳ Mengirim hasil ke Google Sheets...';
  try {
    const r = state._result;
    const params = new URLSearchParams({
      name:r.name, kelas:r.kelas, score:r.score,
      correct:r.correct, wrong:r.wrong, grade:r.grade,
      time:r.time, date:r.date
    });
    await fetch(`${SHEETS_URL}?${params.toString()}`, { method:'GET', mode:'no-cors' });
    s.className='submit-status ok'; s.textContent='✅ Hasil otomatis tersimpan di Google Sheets!';
  } catch(e){
    s.className='submit-status err'; s.textContent='❌ Gagal mengirim. Pastikan URL Google Apps Script sudah benar.';
  }
}

// ════════════════════
//  RESET
// ════════════════════
function resetQuiz(){
  document.getElementById('inputName').value='';
  document.getElementById('inputClass').value='';
  showScreen('loginScreen');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
